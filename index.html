<!DOCTYPE html>
<html>
  <head>
    <title>Flexbox Pricing Table</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Sono", sans-serif;
        background-color: white;
      }
      .pricing-container{
        display: inline-flex;
        flex-direction: row;
        height: 100vh;
        justify-content: center;
        align-items: center;
        gap: 2rem;
        width: 100%;
      }
      .pricing-plan{
        background-color: #F2F2F2;
        border-radius: 5px;
        text-align: center;
        padding: 20px;
        max-width: 400px;
      }

      li{
        list-style: none;
        margin-bottom: 20px;
      }
      .plan-features{
        text-align: center;
        padding: 0px;
        margin: 0px;
      }

      .plan-title{
        font-size: 24px;
        font-weight: bold;
        text-align: center;
      }
      
      .plan-price{
        font-size: 48px;
        font-weight: bold;
        text-align: center;
        padding-top: 10px;
        padding-bottom: 10px;
      }

      .plan-button{
        padding: 10px;
        color: #ffffff;
        background-color: #ff6600;
        border-color: #ff6600;
        border-radius: 5px;
      }

      /* Hint:  Wat kun je doen met een media query en flexbox?  */
      @media (max-width: 750px) {
        .pricing-container{
          display: flex;
          flex-direction: column;
        }
      }
    </style>
  </head>

  <body>
    <div class="pricing-container">
      <div class="pricing-plan">
        <div class="plan-title">Basis</div>
        <div class="plan-price">€11,99/maand</div>
        <ul class="plan-features">
          <li>✅ 10GB Opslag</li>
          <li>✅ 1 Gebruiker</li>
          <li>🚫 Ondersteuning</li>
        </ul>
        <button class="plan-button">Aanmelden</button>
      </div>
      <div class="pricing-plan">
        <div class="plan-title">Standaard</div>
        <div class="plan-price">€19,99/maand</div>
        <ul class="plan-features">
          <li>✅ 50GB Opslag</li>
          <li>✅ 5 Gebruikers</li>
          <li>✅ Telefonische &amp; E-mailondersteuning</li>
        </ul>
        <button class="plan-button">Aanmelden</button>
      </div>
      <div class="pricing-plan">
        <div class="plan-title">Premium</div>
        <div class="plan-price">€49,99/maand</div>
        <ul class="plan-features">
          <li>✅ 100GB Opslag</li>
          <li>✅ 10 Gebruikers</li>
          <li>✅ 24/7 Ondersteuning</li>
        </ul>
        <button class="plan-button">Aanmelden</button>
      </div>
    </div>
  </body>
